{% extends 'base.html' %}

{% block content %}
    <section class="auth-section">
        <div class="container">
            <div class="auth-card fade-in-up">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="bi bi-box-arrow-in-right"></i>
                    </div>
                    <h1 class="auth-title">欢迎回来</h1>
                    <p class="auth-subtitle">登录云管平台，继续管理您的云端资源</p>
                </div>
                <div class="auth-body">
                    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
                        <div class="form-group-modern fade-in-up delay-1">
                            <label for="username" class="form-label-modern">
                                <i class="bi bi-person me-2"></i>用户名
                            </label>
                            <input type="text" class="form-control-modern" id="username" name="username" required 
                                   placeholder="请输入用户名" autocomplete="username">
                        </div>
                        <div class="form-group-modern fade-in-up delay-2">
                            <label for="password" class="form-label-modern">
                                <i class="bi bi-lock me-2"></i>密码
                            </label>
                            <div class="form-input-group">
                                <input type="password" class="form-control-modern" id="password" name="password" required 
                                       placeholder="请输入密码" autocomplete="current-password">
                            </div>
                        </div>
                        <div class="form-options fade-in-up delay-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">记住我</label>
                            </div>
                            <a href="#" class="forgot-link">忘记密码？</a>
                        </div>
                        <button type="submit" class="btn btn-modern btn-primary w-100 fade-in-up delay-4">
                            <i class="bi bi-box-arrow-in-right me-2"></i>登录
                        </button>
                    </form>
                    <div class="auth-footer fade-in-up delay-5">
                        <p class="auth-text">
                            还没有账号？ 
                            <a href="{{ url_for('auth.register') }}" class="auth-link">
                                立即注册 <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                </div>
                <div class="auth-decoration">
                    <div class="decoration-shape shape-1"></div>
                    <div class="decoration-shape shape-2"></div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
