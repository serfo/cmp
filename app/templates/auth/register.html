{% extends 'base.html' %}

{% block content %}
    <section class="auth-section">
        <div class="container">
            <div class="auth-card register-card fade-in-up">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="bi bi-person-plus"></i>
                    </div>
                    <h1 class="auth-title">创建账号</h1>
                    <p class="auth-subtitle">注册云管平台，开启智能运维之旅</p>
                </div>
                <div class="auth-body">
                    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
                        <div class="form-group-modern fade-in-up delay-1">
                            <label for="username" class="form-label-modern">
                                <i class="bi bi-person me-2"></i>用户名
                            </label>
                            <input type="text" class="form-control-modern" id="username" name="username" required 
                                   placeholder="请输入用户名" minlength="3" maxlength="20">
                        </div>
                        <div class="form-group-modern fade-in-up delay-2">
                            <label for="email" class="form-label-modern">
                                <i class="bi bi-envelope me-2"></i>邮箱地址
                            </label>
                            <input type="email" class="form-control-modern" id="email" name="email" required 
                                   placeholder="请输入邮箱地址" autocomplete="email">
                        </div>
                        <div class="form-group-modern fade-in-up delay-3">
                            <label for="password" class="form-label-modern">
                                <i class="bi bi-lock me-2"></i>密码
                            </label>
                            <input type="password" class="form-control-modern" id="password" name="password" required 
                                   placeholder="请输入密码（至少6位）" minlength="6" autocomplete="new-password">
                        </div>
                        <div class="form-group-modern fade-in-up delay-4">
                            <label for="confirm_password" class="form-label-modern">
                                <i class="bi bi-check-circle me-2"></i>确认密码
                            </label>
                            <input type="password" class="form-control-modern" id="confirm_password" name="confirm_password" required 
                                   placeholder="请再次输入密码" autocomplete="new-password">
                        </div>
                        <div class="form-options fade-in-up delay-5">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    我已阅读并同意 <a href="#" class="auth-link">服务条款</a> 和 <a href="#" class="auth-link">隐私政策</a>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-modern btn-primary w-100 fade-in-up delay-6">
                            <i class="bi bi-person-plus me-2"></i>立即注册
                        </button>
                    </form>
                    <div class="auth-footer fade-in-up delay-6">
                        <p class="auth-text">
                            已有账号？ 
                            <a href="{{ url_for('auth.login') }}" class="auth-link">
                                立即登录 <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                </div>
                <div class="auth-decoration">
                    <div class="decoration-shape shape-1"></div>
                    <div class="decoration-shape shape-2"></div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
